# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: A.P.T.I.T.U.D.E.
email: ashle.p@pennandpenn.com
description: >-
  Discernment. Accountability. Held to Answer.
  A platform dedicated to promoting transparency and accountability 
  in public institutions and processes.
baseurl: ""
url: "https://biasbeacon.netlify.app"
environment: production
future: false
show_drafts: false
limit_posts: 500
markdown: kramdown
theme: minima
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
sitemap:
  filename: "sitemap.xml"
incremental: false
profile: false
safe: true
strict_front_matter: true
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
collections:
  reports:
    output: true
    permalink: /:collection/:name/
  investigations:
    output: true
    permalink: /:collection/:name/
paginate: 5
paginate_path: "/page/:num/"
[visual-editor]
  enabled = true
  entry_point = "/"
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
