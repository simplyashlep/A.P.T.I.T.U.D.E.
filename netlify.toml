[build]
  publish = "_site"
  command = "bundle exec jekyll build"

[build.environment]
  RUBY_VERSION = "3.3.5"
  JEKYLL_ENV = "production"

# Enable Visual Editor
[visual-editor]
  enabled = true

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirect rules
[[redirects]]
  from = "/bias-beacon"
  to = "/bias-beacon/"
  status = 301

[[redirects]]
  from = "/bias-beacon/judges"
  to = "/bias-beacon/judges/"
  status = 301

# Handle 404s
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Environment-specific settings
[context.production]
  command = "bundle exec jekyll build --config _config.yml"

[context.deploy-preview]
  command = "bundle exec jekyll build --config _config.yml --drafts"

[context.branch-deploy]
  command = "bundle exec jekyll build --config _config.yml --drafts"

# Plugin settings
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true
[[plugins]]
  package = "@netlify/plugin-nextjs"
  enabled = false
[build.processing.images]
  compress = true
