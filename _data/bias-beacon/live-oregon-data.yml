# Bias Calculation Methodology - Transparent Documentation
# All calculations are standardized across Oregon Judicial Department data
calculation_methodology:
  racial_disparity_score:
    description: "Measures difference in average sentence length by race compared to baseline"
    formula: "((Non-White_Average - White_Average) / White_Average) * 100"
    score_ranges:
      excellent: "< 0 (favors equity)"
      low_concern: "0-3"
      moderate_concern: "3.1-7"
      high_concern: "7.1-12"
      critical: "> 12"
    data_sources: ["OJCIN case records", "OJD sentencing database"]
    
  counsel_disparity_score:
    description: "Measures difference in outcomes based on representation type"
    formula: "((Public_Defense_Average - Private_Attorney_Average) / Private_Attorney_Average) * 100"
    score_ranges:
      excellent: "< 2"
      low_concern: "2-5"
      moderate_concern: "5.1-10"
      high_concern: "10.1-15"
      critical: "> 15"
    factors_considered: ["sentence_length", "conviction_rate", "plea_acceptance"]
    
  prison_rate_calculation:
    description: "Percentage of cases resulting in prison sentence vs alternatives"
    formula: "(Prison_Sentences / Total_Sentences) * 100"
    baseline_comparison: "County and state averages by case type"
    
  reversal_rate_analysis:
    description: "Appeals court reversal rate compared to jurisdiction average"
    formula: "(Reversals / Total_Appeals) * 100"
    significance_threshold: "20% above jurisdiction average"

