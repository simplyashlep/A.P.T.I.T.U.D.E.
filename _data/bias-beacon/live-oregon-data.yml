    - name: "Oregon Judicial Department Data Dashboards"
      url: "https://app.powerbigov.us/view"
      type: "live_dashboard"
      update_frequency: "daily"
      data_types: ["cases_filed", "cases_closed", "unrepresented_analysis", "pending_trends"]
      
