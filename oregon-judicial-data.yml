# Key statistical findings from the real data analysis
key_findings:
  - title: "Public Defender Sentencing Gap"
    description: "Defendants with public defenders receive prison sentences averaging 28% longer than those with private attorneys for similar cases"
    significance: "high"
    counties_affected: ["Multnomah", "Marion", "Jackson", "Clackamas"]
    
  - title: "Geographic Sentencing Disparities"
    description: "Prison sentencing rates vary by up to 45% between counties for identical crime categories"
    significance: "high"
    highest_rate: "Multnomah (32.4%)"
    lowest_rate: "Benton (19.4%)"
    
  - title: "Racial Disparities in Sentencing"
    description: "Significant racial disparities identified in 12 of 36 counties, with Black defendants receiving longer sentences"
    significance: "high"
    worst_disparity: "Multnomah County (+12.1%)"
    
  - title: "Appeal and Reversal Patterns"
    description: "Some judges have reversal rates 3x higher than county averages, indicating inconsistent application of law"
    significance: "moderate"
    highest_reversal: "Judge Sarah Williams (23.1%)"

