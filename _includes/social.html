{%- assign social = site.minima.social_links -%}
<ul class="social-media-list">
  {%- if social.github -%}<li><a href="https://github.com/{{ social.github | cgi_escape | escape }}"><svg class="svg-icon"><use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use></svg> <span class="username">{{ social.github| escape }}</span></a></li>{%- endif -%}
  {%- if social.twitter -%}<li><a href="https://www.twitter.com/{{ social.twitter | cgi_escape | escape }}"><svg class="svg-icon"><use xlink:href="{{ '/assets/minima-social-icons.svg#twitter' | relative_url }}"></use></svg> <span class="username">{{ social.twitter| escape }}</span></a></li>{%- endif -%}
</ul>
