<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body class="{{ page.body_class | default: layout.body_class }}">

    {%- include header.html -%}

    <main class="page-content" aria-label="Content">
      <div class="wrapper {{ page.wrapper_class | default: layout.wrapper_class }}">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}
    <script src="{{ '/assets/js/site-ui.js' | relative_url }}"></script>

  </body>

</html>
